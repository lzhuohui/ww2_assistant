# -*- coding: utf-8 -*-
# -------------------------------------------
# 打野界面配置
# -------------------------------------------
界面布局:
  dropdown_width: 100
  input_width: 100
  controls_per_row: 2
  control_spacing: 6
  card_height: 100

# -------------------------------------------
# 自动打野
# -------------------------------------------
自动打野:
  卡片信息:
    title: 自动打野
    icon: EXPLORE
    subtitle: 设置自动打野参数
    enabled: false
  控件列表:
    - id: 野怪等级
      type: dropdown
      label: 等级
      options: ["全部", "1-3级", "4-6级", "7-9级", "10级以上"]
      default: "全部"
    - id: 搜索频率
      type: dropdown
      label: 频率
      options: ["每30分钟", "每小时", "每2小时", "每4小时"]
      default: "每小时"
