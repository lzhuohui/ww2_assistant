# -*- coding: utf-8 -*-
# -------------------------------------------
# 打野界面配置
# -------------------------------------------
界面布局:
  dropdown_width: 100
  input_width: 100
  controls_per_row: 1
  control_spacing: 6
  card_height: 100

# -------------------------------------------
# 自动打野
# -------------------------------------------
自动打野:
  卡片信息:
    title: 自动打野
    icon: EXPLORE
    subtitle: 设置自动打野参数
    enabled: false
  控件列表:
    - id: 主城等级
      type: dropdown
      label: 主城等级
      options: ["05", "06", "07", "08", "09", "10", "11", "12", "13", "14", "15"]
      default: "10"
    - id: 野怪等级
      type: dropdown
      label: 野怪等级
      options: ["01", "02", "03", "04"]
      default: "03"