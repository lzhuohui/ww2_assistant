# -*- coding: utf-8 -*-
# -------------------------------------------
# 策略界面配置
# -------------------------------------------
界面布局:
  dropdown_width: 100
  input_width: 100
  controls_per_row: 1
  control_spacing: 6
  card_height: 100

# -------------------------------------------
# 建筑速建
# -------------------------------------------
建筑速建:
  卡片信息:
    title: 建筑速建
    icon: FLASH_ON
    subtitle: 设置快速建筑策略
    enabled: false
  控件列表:
    - id: 速建限级
      type: dropdown
      label: 限级
      options: ["05", "06", "07", "08", "09", "10", "11", "12", "13", "14", "15"]
      default: "08"
    - id: 速建类型
      type: dropdown
      label: 类型
      options: ["城资建筑", "城市建筑", "资源建筑"]
      default: "城资建筑"

# -------------------------------------------
# 资源速产
# -------------------------------------------
资源速产:
  卡片信息:
    title: 资源速产
    icon: FACTORY
    subtitle: 设置快速生产策略
    enabled: false
  控件列表:
    - id: 速产限级
      type: dropdown
      label: 限级
      options: ["05", "06", "07", "08", "09", "10", "11", "12", "13", "14", "15"]
      default: "07"
    - id: 速产类型
      type: dropdown
      label: 类型
      options: ["平衡资源", "战时经济", "钢铁熔炉", "橡胶采集", "石油开采"]
      default: "平衡资源"

# -------------------------------------------
# 策点保留
# -------------------------------------------
策点保留:
  卡片信息:
    title: 策点保留
    icon: SAVINGS
    subtitle: 设置策略点保留数量
    enabled: false
  控件列表:
    - id: 保留点数
      type: dropdown
      label: 点数
      options: ["30", "60", "90", "120", "150", "180", "210", "240"]
      default: "60"
