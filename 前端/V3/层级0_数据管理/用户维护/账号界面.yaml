# ===========================================
# 账号界面配置
# 说明：管理多个游戏账号信息
# 维护者：开发团队
# 最后更新：2026-04-01
# ===========================================

# -------------------------------------------
# 界面级布局（全局默认值）
# 所有卡片和控件未单独设置时使用此配置
# -------------------------------------------
界面布局:
  dropdown_width: 80       # 下拉框宽度(px)
  input_width: 180         # 输入框宽度(px)
  controls_per_row: 6      # 每行控件数
  control_spacing: 6       # 控件间距(px)
  card_height: 100         # 卡片高度(px)

# -------------------------------------------
# 账号01卡片
# 第一个账号配置
# -------------------------------------------
账号01:
  卡片信息:
    title: 账号01
    icon: ACCOUNT_CIRCLE
    subtitle: 设置账号信息
    enabled: true
  控件列表:
    - id: 类型
      type: dropdown
      label: ""
      options: ["主帅", "副帅"]
      default: 主帅
      dropdown_width: 70
    - id: 名称
      type: input
      label: 名称
      hint: 输入名称
      default: 
    - id: 账号
      type: input
      label: 账号
      hint: 输入账号
      default: ""
    - id: 密码
      type: input
      label: 密码
      hint: 输入密码
      password: true
      default: ""
    - id: 方案
      type: dropdown
      label: 
      options: ["默认方案"]
      default: 默认方案
      dropdown_width: 90
    - id: 平台
      type: dropdown
      label: 
      options: ["Tap", "九游", "Fan", "小7", "Vivo", "Opop"]
      default: Tap
      dropdown_width: 70

