# -*- coding: utf-8 -*-
# -------------------------------------------
# 任务界面配置
# -------------------------------------------
界面布局:
  dropdown_width: 100
  input_width: 100
  controls_per_row: 1
  control_spacing: 6
  card_height: 100

# -------------------------------------------
# 主线任务
# -------------------------------------------
主线任务:
  卡片信息:
    title: 主线任务
    icon: TASK
    subtitle: 设置主线任务触发等级
    enabled: false
  控件列表:
    - id: 主城等级
      type: dropdown
      label: 等级
      options: ["01", "02", "03", "04", "05", "06", "07", "08", "09", "10", "11", "12", "13", "14", "15"]
      default: "01"

# -------------------------------------------
# 支线任务
# -------------------------------------------
支线任务:
  卡片信息:
    title: 支线任务
    icon: TASK_ALT
    subtitle: 设置支线任务触发等级
    enabled: false
  控件列表:
    - id: 支线主城等级
      type: dropdown
      label: 等级
      options: ["05", "06", "07", "08", "09", "10", "11", "12", "13", "14", "15"]
      default: "05"
