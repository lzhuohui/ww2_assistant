# ============================================================
# 渲染规范.yaml
# 用途：Windows 11 Fluent Design 渲染规范数据
# 性质：设计时数据，定义UI渲染标准
# 来源：Microsoft Fluent Design System
# ============================================================

# ============================================================
# 主题配置
# 说明：深色/浅色主题的完整颜色方案
# ============================================================
主题配置:
  dark:
    bg_primary: '#202020'
    bg_secondary: '#1E1E1E'
    bg_tertiary: '#2D2D2D'
    bg_card: '#2D2D2D'
    bg_hover: '#3A3A3A'
    bg_selected: '#3A3A3A'
    text_primary: '#FFFFFF'
    text_secondary: '#B0B0B0'
    text_disabled: '#666666'
    border: '#3D3D3D'
    border_hover: '#5C5C5C'
    accent: '#0078D4'
    accent_hover: '#1A86D9'
    accent_pressed: '#006CBD'
    shadow: rgba(0, 0, 0, 0.25)
  light:
    bg_primary: '#FFFFFF'
    bg_secondary: '#F5F5F5'
    bg_tertiary: '#EBEBEB'
    bg_card: '#FFFFFF'
    bg_hover: '#F3F4F6'
    bg_selected: '#E1EBF7'
    text_primary: '#1A1A1A'
    text_secondary: '#666666'
    text_disabled: '#999999'
    border: '#E0E0E0'
    border_hover: '#CCCCCC'
    accent: '#0078D4'
    accent_hover: '#1A86D9'
    accent_pressed: '#006CBD'
    shadow: rgba(0, 0, 0, 0.1)

# ============================================================
# 强调色配置
# 说明：可选的系统强调色
# ============================================================
强调色配置:
  blue:
    name: 蓝色
    value: '#0078D4'
  green:
    name: 绿色
    value: '#107C10'
  red:
    name: 红色
    value: '#D13438'
  orange:
    name: 橙色
    value: '#FF8C00'

# ============================================================
# UI配置
# 说明：字体、边距、圆角、阴影等渲染参数
# ============================================================
UI配置:
  # 字体规格
  字体:
    小: 14
    中: 16
    大: 18
  
  # 边距规格
  边距:
    小: 6
    中: 8
    大: 10
  
  # 圆角规格
  圆角:
    小: 3
    中: 6
    大: 9
  
  # 阴影规格（Win11 Fluent Design）
  # 菜单：elevation 32px
  # 卡片：elevation 8px
  # 对话框：elevation 128px
  阴影:
    菜单:
      blur_radius: 16
      spread_radius: 0
      offset_x: 0
      offset_y: 4
      opacity: 0.16
    卡片:
      blur_radius: 8
      spread_radius: 1
      offset_x: 0
      offset_y: 2
      opacity: 0.12
    对话框:
      blur_radius: 32
      spread_radius: 0
      offset_x: 0
      offset_y: 8
      opacity: 0.20
  
  # 动画规格（Win11 Fluent Design）
  # 标准过渡时长：167ms
  # 快速过渡：83ms
  # 慢速过渡：250ms
  动画:
    过渡时长: 167
    快速过渡: 83
    慢速过渡: 250
    缓动函数: easeOut
  
  # 使用映射
  使用:
    界面内边距: 大
    卡片内边距: 小
    卡片间距: 中
    控件间距: 小
    控件区内边距: 小
    标签控件间距: 小
    下拉框内边距: 中
    下拉框选项间距: 小
    输入框内边距: 小
    色块间距: 中
    卡片圆角: 中
    标题字体: 大
    正文字体: 中
    副标题字体: 小
    图标大小: 大
  
  # 控件尺寸
  控件:
    下拉框宽度: 100
    下拉框高度: 30
    下拉框最大菜单高度: 540
    输入框宽度: 120
    输入框高度: 30
    每行控件数: 6
  
  # 卡片开关
  卡片开关:
    左侧宽度: 100
    分割线宽度: 2
  
  # 导航
  导航:
    宽度: 200
    项高度: 32
    指示条宽度: 3

# ============================================================
# 文本配置
# 说明：各类控件的默认文本
# ============================================================
文本配置:
  下拉框:
    占位符: 点击加载选项...
    加载中: 加载中...
  输入框:
    占位符: 请输入...
