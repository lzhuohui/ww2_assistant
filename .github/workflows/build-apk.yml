name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install flet==0.82.0
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.5'
        channel: 'stable'
    
    - name: Accept Android licenses
      run: |
        yes | sdkmanager --licenses || true
        flutter doctor --android-licenses
    
    - name: Install Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Check Flutter environment
      run: |
        flutter doctor -v
    
    - name: Build APK
      env:
        FLET_CLI_NO_RICH_OUTPUT: 1
        PYTHONIOENCODING: utf-8
      run: |
        # 清理之前的构建目录
        rm -rf build/
        
        # 构建APK
        echo "开始构建APK..."
        python -m flet.cli build apk --verbose --project "WW2Assistant"
        
        # 检查构建结果并查找APK文件
        echo "检查构建结果..."
        echo "搜索APK文件..."
        
        # 查找所有APK文件
        find . -name "*.apk" -type f 2>/dev/null | while read apk_file; do
          echo "找到APK文件: $apk_file"
          echo "文件大小: $(ls -lh "$apk_file" | awk '{print $5}')"
          echo "文件路径: $(dirname "$apk_file")"
        done
        
        # 检查常见输出目录
        echo ""
        echo "检查常见构建目录:"
        if [ -d "build" ]; then
          echo "build目录内容:"
          find build -type f -name "*.apk" 2>/dev/null | head -10
          echo ""
          find build -type d 2>/dev/null | head -20
        fi
        
        if [ -d "build/apk" ]; then
          echo "build/apk目录内容:"
          ls -la build/apk/
        fi
        
        # 检查是否至少有一个APK文件
        apk_count=$(find . -name "*.apk" -type f 2>/dev/null | wc -l)
        if [ $apk_count -eq 0 ]; then
          echo "错误: 未找到任何APK文件！"
          echo "可能的构建失败。"
          exit 1
        else
          echo "✅ 找到 $apk_count 个APK文件"
        fi
    
    - name: Find and collect APK files
      if: success()
      run: |
        echo "收集所有APK文件..."
        mkdir -p artifacts
        
        # 查找并复制所有APK文件到artifacts目录
        find . -name "*.apk" -type f -exec cp {} artifacts/ \;
        
        echo "收集到的APK文件:"
        ls -la artifacts/
        
        # 如果没有找到文件，创建占位符
        if [ ! -f "artifacts/*.apk" ]; then
          echo "警告: 未找到APK文件，创建测试文件"
          echo "构建失败或输出路径未知" > artifacts/build-status.txt
        fi
    
    - name: Upload APK artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: ww2-assistant-apk
        path: artifacts/
        retention-days: 7
    
    - name: Upload build directory (for debugging)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-debug-info
        path: build/
        retention-days: 7