name: Build APK for Gitee

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install flet==0.82.0
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.5'
        channel: 'stable'
    
    - name: Accept Android licenses
      run: |
        yes | sdkmanager --licenses || true
        flutter doctor --android-licenses
    
    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Build APK with Flet
      env:
        FLET_CLI_NO_RICH_OUTPUT: 1
        PYTHONIOENCODING: utf-8
      run: |
        set -e  # 出错时退出
        echo "开始构建APK..."
        
        # 清理旧的构建
        rm -rf build/ || true
        
        # 显示环境信息
        echo "Python版本:"
        python --version
        echo "Flet版本:"
        python -m flet.cli --version
        echo "当前目录:"
        pwd
        echo "项目文件:"
        ls -la
        
        # 构建APK
        echo "运行Flet构建命令..."
        python -m flet.cli build apk --verbose --project "WW2Assistant" || {
          echo "Flet构建失败，尝试诊断..."
          # 检查Flet版本
          python -m flet.cli --version
          # 检查项目结构
          echo "项目结构:"
          ls -la
          echo "main.py内容:"
          head -20 main.py || echo "main.py不存在"
          exit 1
        }
        
        echo "构建完成，搜索APK文件..."
        
        # 查找所有APK文件
        find . -name "*.apk" -type f 2>/dev/null | while read apk; do
          echo "找到APK: $apk"
          ls -lh "$apk"
        done
        
        # 创建明确的输出目录
        mkdir -p apk-output
        
        # 复制所有APK文件到输出目录
        find . -name "*.apk" -type f -exec cp {} apk-output/ \; 2>/dev/null || true
        
        echo "APK文件已收集到 apk-output/ 目录:"
        ls -la apk-output/ || echo "apk-output目录为空"
        
        # 检查是否有APK文件
        if ls apk-output/*.apk 1>/dev/null 2>&1; then
          echo "✅ 找到APK文件"
          APK_COUNT=$(find apk-output -name "*.apk" -type f | wc -l)
          echo "APK文件数量: $APK_COUNT"
        else
          echo "❌ 未找到APK文件"
          echo "构建可能失败，检查日志..."
          # 保存构建日志
          find build -type f -name "*.log" -exec cat {} \; > apk-output/build-error.log 2>/dev/null || true
          echo "详细错误信息已保存到 apk-output/build-error.log"
          exit 1
        fi
    
    - name: Create APK archive
      if: success()
      run: |
        echo "创建APK压缩包..."
        
        # 进入输出目录
        cd apk-output
        
        # 创建ZIP文件
        zip -r ../ww2-assistant-apk.zip ./*
        
        echo "ZIP文件创建完成:"
        ls -lh ../ww2-assistant-apk.zip
        
        # 返回到项目根目录
        cd ..
    
    - name: Upload APK archive
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: WW2Assistant-APK
        path: ww2-assistant-apk.zip
        retention-days: 30
    
    - name: Upload individual APK files
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: APK-Files
        path: apk-output/*.apk
        retention-days: 30
    
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Logs
        path: |
          build/
          **/*.log
        retention-days: 7
