[pytest]
# 测试目录
testpaths = 测试

# 测试文件命名规则
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 默认运行参数
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    gui: GUI测试
    api: API测试

# 覆盖率配置
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 控制台输出
console_output_style = progress

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S
