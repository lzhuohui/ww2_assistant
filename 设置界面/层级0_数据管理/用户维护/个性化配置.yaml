# -*- coding: utf-8 -*-
# -------------------------------------------
# 个性化界面配置
# -------------------------------------------
界面布局:
  dropdown_width: 100
  input_width: 100
  controls_per_row: 1
  control_spacing: 6
  card_height: 100

# -------------------------------------------
# 主题模式
# -------------------------------------------
主题模式:
  卡片信息:
    title: 主题模式
    icon: BRIGHTNESS_MEDIUM
    subtitle: 选择界面主题模式
    enabled: true
  控件列表:
    - id: theme_selector
      type: color_block
      label: "主题:"
      block_type: theme

# -------------------------------------------
# 强调色
# -------------------------------------------
强调色:
  卡片信息:
    title: 强调色
    icon: PALETTE
    subtitle: 选择界面强调色
    enabled: true
  控件列表:
    - id: accent_selector
      type: color_block
      label: "强调色:"
      block_type: accent
