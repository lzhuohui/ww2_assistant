# ===========================================
# 系统界面配置
# 说明：系统核心设置，影响全局运行
# 维护者：开发团队
# 最后更新：2026-04-05
# ===========================================

# -------------------------------------------
# 界面级布局（全局默认值）
# 所有卡片和控件未单独设置时使用此配置
# -------------------------------------------
界面布局:
  dropdown_width: 100
  input_width: 100
  controls_per_row: 3
  control_spacing: 6
  card_height: 100

# -------------------------------------------
# 挂机模式卡片
# -------------------------------------------
挂机模式:
  卡片信息:
    title: 挂机模式
    icon: POWER_SETTINGS_NEW
    subtitle: "全自动:自动挂机,无需人为干预 | 半自动:点击头像,自动切换账号"
    no_switch: true
  控件列表:
    - id: 挂机模式
      type: dropdown
      label: "模式选择:"
      options: ["全自动", "半自动"]
      default: 全自动

# -------------------------------------------
# 指令速度卡片
# -------------------------------------------
指令速度:
  卡片信息:
    title: 指令速度
    icon: SPEED
    subtitle: 指令间隔(毫秒) | 数值越小速度越快
    no_switch: true
  控件列表:
    - id: 指令速度
      type: dropdown
      label: "速度选择:"
      options: ["100", "150", "200", "250", "300", "350", "400", "450", "500"]
      default: "100"

# -------------------------------------------
# 尝试次数卡片
# -------------------------------------------
尝试次数:
  卡片信息:
    title: 尝试次数
    icon: REFRESH
    subtitle: 失败达上限后自动纠错
    no_switch: true
  控件列表:
    - id: 尝试次数
      type: dropdown
      label: "次数选择:"
      options: ["10", "15", "20", "25", "30"]
      default: "15"

# -------------------------------------------
# 清缓限量卡片
# -------------------------------------------
清缓限量:
  卡片信息:
    title: 清缓限量
    icon: DELETE_SWEEP
    subtitle: 缓存达阈值(M)自动清理
    no_switch: true
  控件列表:
    - id: 清缓限量
      type: dropdown
      label: "限量选择:"
      options: ["1.0", "1.5", "2.0", "2.5", "3.0", "3.5", "4.0", "4.5", "5.0"]
      default: "1.0"
